<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08142f" />
  <title>DL WMS</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div class="bg-overlay" aria-hidden="true"></div>
  <div id="app-shell">
    <header class="top-header card-glass">
      <div>
        <h1 id="page-title">DL WMS</h1>
        <p id="page-subtitle">Plateforme logistique offline</p>
      </div>
      <button id="btn-install" class="btn secondary" hidden>Installer</button>
    </header>

    <main id="app" aria-live="polite"></main>

    <aside id="ai-panel" class="card-glass ai-panel">
      <h3>Assistant IA offline</h3>
      <div id="ai-messages" class="ai-messages"></div>
      <div class="ai-actions">
        <input id="ai-input" type="text" placeholder="Posez une question..." />
        <button id="ai-send" class="btn">Envoyer</button>
        <button id="ai-why" class="btn secondary">Pourquoi ?</button>
      </div>
    </aside>

    <nav class="bottom-nav card-glass" aria-label="Navigation principale">
      <a href="#/modules" data-nav>Modules</a>
      <a href="#/history" data-nav>Historique</a>
      <a href="#/settings" data-nav>Paramètres</a>
    </nav>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
